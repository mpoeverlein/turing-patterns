<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Diffusion Equation Solver</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        canvas {
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s, background 0.2s;
        }
        
        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .info {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .timestep {
            font-weight: bold;
            color: #667eea;
        }
        
        input {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 0 5px;
        }
        
        label {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 2D Diffusion Equation Solver</h1>
        <canvas id="diffusionCanvas" width="500" height="500"></canvas>
        
        <div class="controls">
            <button id="startBtn">▶ Start Diffusion</button>
            <button id="resetBtn">🔄 Reset</button>
            <button id="pauseBtn">⏸ Pause</button>
        </div>
        
        <div class="controls">
            <label>
                Diffusion Coefficient of P (DP):
                <input type="range" id="PdiffusionCoeff" min="0.01" max="0.5" step="0.01" value="0.1">
                <span id="dPValue">0.10</span>
            </label>
            <label>
                Diffusion Coefficient of S (DS):
                <input type="range" id="SdiffusionCoeff" min="0.01" max="1000" step="0.01" value="0.1">
                <span id="dSValue">0.10</span>
            </label>
            <label>
                Coupling of inhibition (k):
                <input type="range" id="kcoupling" min="0.1" max="10" step="0.1" value="0.1">
                <span id="kValue">0.10</span>
            </label>
            <label>
                Simulation Speed:
                <input type="range" id="speed" min="1" max="60" step="1" value="30">
                <span id="speedValue">30</span> fps
            </label>
        </div>
        
        <div class="info">
            Time step: <span id="stepCount" class="timestep">0</span> | 
            Maximum P conc: <span id="maxPconc" class="timestep">0.00</span>
            Maximum S conc: <span id="maxSconc" class="timestep">0.00</span>
            Total mass: <span id="totalMass" class="timestep">0.00</span>
        </div>
    </div>
    
    <!--<script src="diffusion.js"></script>-->
    <script src="turing.js"></script>
</body>
</html>
